syntax = "proto3";

package testshapes;

import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/sudorandom/protojsonx/internal/testpb";

enum TestEnum {
  TEST_ENUM_UNSPECIFIED = 0;
  TEST_ENUM_FIRST = 1;
  TEST_ENUM_SECOND = 2;
}

message ComplexMessage {
  // Primitives
  double double_field = 1;
  float float_field = 2;
  int32 int32_field = 3;
  int64 int64_field = 4;
  uint32 uint32_field = 5;
  uint64 uint64_field = 6;
  sint32 sint32_field = 7;
  sint64 sint64_field = 8;
  fixed32 fixed32_field = 9;
  fixed64 fixed64_field = 10;
  sfixed32 sfixed32_field = 11;
  sfixed64 sfixed64_field = 12;
  bool bool_field = 13;
  string string_field = 14;
  bytes bytes_field = 15;
  TestEnum enum_field = 16;

  // Well-Known Types
  google.protobuf.Timestamp timestamp_field = 17;
  google.protobuf.Duration duration_field = 18;

  // Nested message
  ChildMessage child_field = 19;

  // Repeated
  repeated string repeated_string = 20;
  repeated ChildMessage repeated_message = 21;

  // Map
  map<string, string> map_string_string = 22;
}

message ChildMessage {
  string name = 1;
  int32 value = 2;
}

message SpecMessage {
  google.protobuf.Any any_field = 1;
  google.protobuf.Empty empty_field = 2;
  google.protobuf.FieldMask field_mask_field = 3;
  google.protobuf.DoubleValue double_value_field = 7;
  google.protobuf.FloatValue float_value_field = 8;
  google.protobuf.Int64Value int64_value_field = 9;
  google.protobuf.UInt64Value uint64_value_field = 10;
  google.protobuf.Int32Value int32_value_field = 11;
  google.protobuf.UInt32Value uint32_value_field = 12;
  google.protobuf.BoolValue bool_value_field = 13;
  google.protobuf.StringValue string_value_field = 14;
  google.protobuf.BytesValue bytes_value_field = 15;
}

message StructMessage {
  google.protobuf.Struct struct_field = 1;
}

message ValueMessage {
  google.protobuf.Value value_field = 1;
}

message ListValueMessage {
  google.protobuf.ListValue list_value_field = 1;
}

message CompatibilityMessage {
  oneof choice {
    string name_choice = 1;
    int32 number_choice = 2;
    ChildMessage child_choice = 3;
  }

  optional string optional_string = 4;
  optional int32 optional_int32 = 5;

  repeated int32 repeated_int32 = 6;
  repeated bool repeated_bool = 7;
  repeated bytes repeated_bytes = 8;
  repeated TestEnum repeated_enum = 9;

  map<string, int32> map_string_int32 = 10;
  map<int32, string> map_int32_string = 11;
  map<string, ChildMessage> map_string_message = 12;
}
