syntax = "proto3";

package user;

option go_package = "github.com/sudorandom/protojsonx/internal/testpb";

enum UserStatus {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
  STATUS_SUSPENDED = 3;
}

message UserProfile {
  string id = 1;
  string email = 2;
  string name = 3;
  int32 age = 4;
  bool is_active = 5;
  UserStatus status = 6;
  repeated string tags = 7;
  map<string, string> metadata = 8;
  Address address = 9;
  repeated Session sessions = 10;
}

message Address {
  string street = 1;
  string city = 2;
  string state = 3;
  string zip = 4;
  string country = 5;
}

message Session {
  string session_id = 1;
  int64 login_timestamp = 2;
  string ip_address = 3;
}

service UserService {
  rpc GetUserProfile(UserProfile) returns (UserProfile);
}
