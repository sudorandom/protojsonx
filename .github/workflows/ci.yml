name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Unit Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [ '1.24.x', '1.25.x', '1.26.x' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run Unit Tests
        run: |
          go test -v ./...
          (cd protojsonxconnect && go test -v ./...)
          (cd protojsonxgrpc && go test -v ./...)

  lint-fuzz:
    name: Lint and Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Run Linter
        uses: golangci/golangci-lint-action@v6
        with:
          args: ./...

      - name: Run Fuzz Stress Tests
        run: go test -fuzz=FuzzUnmarshal -fuzztime=10s .
