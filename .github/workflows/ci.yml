name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Unit Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [ '1.25.x', '1.26.x' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up tools via mise
        uses: jdx/mise-action@v4
        with:
          install_args: "just"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run Unit Tests
        run: just test

  lint-fuzz:
    name: Lint and Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up tools via mise
        uses: jdx/mise-action@v4

      - name: Run Linter
        run: just lint

      - name: Run Fuzz Stress Tests
        run: just fuzz
