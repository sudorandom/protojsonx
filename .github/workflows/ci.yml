name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [ '1.25.x', '1.26.x' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up tools via mise
        uses: jdx/mise-action@v4
        with:
          install_args: "just"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run Unit Tests
        run: just test

  lint-fuzz:
    name: Lint and Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up tools via mise
        uses: jdx/mise-action@v4

      - name: Run Linter
        run: just lint

      - name: Run Fuzz Stress Tests
        run: just fuzz

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up tools via mise
        uses: jdx/mise-action@v4

      - name: Cache conformance runner
        id: cache-conformance
        uses: actions/cache@v4
        with:
          path: runner-bin
          key: conformance-runner-v29.3-${{ runner.os }}

      - name: Build conformance runner
        if: steps.cache-conformance.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v29.3 https://github.com/protocolbuffers/protobuf.git
          cd protobuf
          bazel build //conformance:conformance_test_runner
          mkdir -p ../runner-bin
          cp bazel-bin/conformance/conformance_test_runner ../runner-bin/

      - name: Build conformance binaries
        run: |
          just conformance-binary
          just plugin-conformance-binary

      - name: Run conformance tests (Library Mode)
        run: ./runner-bin/conformance_test_runner --enforce_recommended .bin/protojsonx-conformance

      - name: Run conformance tests (Plugin Mode)
        run: ./runner-bin/conformance_test_runner --enforce_recommended .bin/protojsonx-plugin-conformance
