# This is a GoReleaser configuration.
# See https://goreleaser.com for details.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: protoc-gen-go-protojsonx
    main: ./cmd/protoc-gen-go-protojsonx
    binary: protoc-gen-go-protojsonx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
